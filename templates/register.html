{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card p-4 shadow-sm border-0 mt-5">
            <h3 class="text-center fw-bold">Регистрация</h3>
            <hr>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Имя пользователя</label>
                    <input type="text" name="username" class="form-control" required placeholder="Никнейм">
                </div>
                <div class="mb-3">
                    <label class="form-label">Пароль</label>
                    <input type="password" name="password" class="form-control" required placeholder="Пароль">
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Создать аккаунт</button>
            </form>
            <div class="mt-3 text-center">
                <small class="text-muted">Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
