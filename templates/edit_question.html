{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="card-title mb-4">Редактировать вопрос</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Заголовок вопроса</label>
                        <input type="text" name="title" class="form-control" value="{{ question.title }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Суть вопроса</label>
                        <textarea name="content" class="form-control" rows="6" required>{{ question.content }}</textarea>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('question', id=question.id) }}" class="btn btn-secondary">Отмена</a>
                        <button type="submit" class="btn btn-primary">Сохранить изменения</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
